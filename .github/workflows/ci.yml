name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.txt ./...

      - name: Build
        run: go build ./...

      - name: Verify generated artifacts are up to date
        run: |
          go run ./cmd/mysql-mcp gen-schema
          go run ./cmd/mysql-mcp gen-config-docs
          if ! git diff --quiet schema docs/configuration.md; then
            echo "Generated schema/docs are stale. Run gen-schema and gen-config-docs and commit."
            git diff --stat schema docs/configuration.md
            exit 1
          fi

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          # v2.x is built with a recent Go; older v1 releases (built with go1.24)
          # refuse our go 1.25 target with "language version lower than targeted".
          version: v2.12.2

  nix:
    name: Nix build & flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: extractions/setup-just@v2
      # Align flake.nix vendorHash with go.sum before building. On a dependency
      # bump (e.g. a Dependabot PR) the committed hash is stale; this validates
      # the PR with the correct hash. generate.yml commits the fix to master on
      # merge. No-op when go.sum is unchanged.
      - run: just sync-flake
      - run: nix build .#default
      - run: nix flake check
