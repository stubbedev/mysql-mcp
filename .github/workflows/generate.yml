name: Generate

# Regenerates derived artifacts (config JSON Schema, config docs, API docs and
# the flake vendorHash) and commits them back to the branch. Runs on pushes to
# main and on demand.
on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/generate.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Generate config schema
        run: go run ./cmd/mysql-mcp gen-schema

      - name: Generate config docs
        run: go run ./cmd/mysql-mcp gen-config-docs

      - name: Generate API docs
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          "$(go env GOPATH)/bin/gomarkdoc" --output docs/api.md ./...

      - name: Update flake vendorHash
        run: bash scripts/update-vendor-hash.sh

      - name: Commit regenerated artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate docs, schema and flake vendorHash"
          file_pattern: "schema/config.schema.json docs/configuration.md docs/api.md flake.nix"
