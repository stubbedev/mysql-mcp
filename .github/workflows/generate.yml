name: Generate

# Regenerates derived artifacts (config JSON Schema, config docs, API docs and
# the flake vendorHash) and commits them back to the branch. Runs on pushes to
# master and on demand.
on:
  push:
    branches: [master]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/generate.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: extractions/setup-just@v4

      - name: Regenerate schema, docs and flake vendorHash
        run: |
          just sync-schema
          just sync-docs
          just sync-flake

      - name: Commit regenerated artifacts
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: regenerate docs, schema and flake vendorHash"
          file_pattern: "schema/config.schema.json docs/configuration.md docs/api.md flake.nix"
